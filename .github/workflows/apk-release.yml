name: APK Release
on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.EXAMSCAN_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/examscan-release.jks"
      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          EXAMSCAN_KEYSTORE_FILE: ${{ runner.temp }}/examscan-release.jks
          EXAMSCAN_KEYSTORE_PASSWORD: ${{ secrets.EXAMSCAN_KEYSTORE_PASSWORD }}
          EXAMSCAN_KEY_ALIAS: ${{ secrets.EXAMSCAN_KEY_ALIAS }}
          EXAMSCAN_KEY_PASSWORD: ${{ secrets.EXAMSCAN_KEY_PASSWORD }}
      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk
      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk ExamScan-${GITHUB_REF_NAME}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ExamScan-release-apk
          path: ExamScan-*.apk
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ExamScan-*.apk
          generate_release_notes: true
