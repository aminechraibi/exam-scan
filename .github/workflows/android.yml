name: Android CI
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint, unit tests, and debug/release builds
        run: ./gradlew lintDebug testDebugUnitTest assembleDebug assembleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exam-scan-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  emulator-tests:
    runs-on: ubuntu-latest
    env:
      EXAMSCAN_KEYSTORE_PASSWORD: ${{ secrets.EXAMSCAN_KEYSTORE_PASSWORD }}
      EXAMSCAN_KEY_ALIAS: ${{ secrets.EXAMSCAN_KEY_ALIAS }}
      EXAMSCAN_KEY_PASSWORD: ${{ secrets.EXAMSCAN_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.EXAMSCAN_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/examscan-release.jks"
          echo "EXAMSCAN_KEYSTORE_FILE=$RUNNER_TEMP/examscan-release.jks" >> "$GITHUB_ENV"
      - name: Room and device tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: |
            ./gradlew connectedDebugAndroidTest assembleDebug assembleRelease --stacktrace
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n com.example.examscan.debug/com.example.examscan.MainActivity
            adb shell pidof com.example.examscan.debug
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
            adb uninstall com.example.examscan.debug
            adb install app/build/outputs/apk/release/app-release.apk
            adb shell am start -W -n com.example.examscan/com.example.examscan.MainActivity
            adb shell pidof com.example.examscan
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumentation-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
